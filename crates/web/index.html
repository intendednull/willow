<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <!--
        Content-Security-Policy — see GitHub issue #175.

        Directive notes:
        * script-src includes 'wasm-unsafe-eval' so the Leptos WASM module can
          execute. 'unsafe-eval' is also required today because several call
          sites still use js_sys::eval() (theme bootstrap, focus helpers,
          relay-URL probe). Removing it is tracked separately by issues #171
          and #425; the CSP must not regress those code paths until then.
        * style-src needs 'unsafe-inline' because the Leptos views render
          inline style="…" attributes. Google Fonts is allow-listed because
          foundation.css @imports the stylesheet from fonts.googleapis.com,
          and the actual font files are fetched from fonts.gstatic.com
          (font-src).
        * connect-src permits ws:/wss: for the relay WebSocket transport
          (ws://localhost in dev, wss://… in production) and https: for the
          relay's /bootstrap-id HTTP endpoint.
        * img-src and media-src include data:/blob: so that avatar data
          URIs and runtime URL.createObjectURL blobs (file attachments,
          inline media) render. img-src additionally allows https: so the
          chat auto-embed code path (see issue #584 / PR #243, which added
          referrerpolicy="no-referrer" to external <img> tags) can fetch
          remote images over HTTPS without a mixed-content downgrade.
          frame-ancestors 'none' blocks clickjacking;
          base-uri / form-action / object-src lock down the remaining
          injection surfaces.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss: https:; img-src 'self' https: data: blob:; media-src 'self' blob:; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1e">
    <title>Willow</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link data-trunk rel="css" href="foundation.css" />
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="css" href="components.css" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="icon-192.svg" />
    <link data-trunk rel="copy-file" href="icon-512.svg" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="willow-chime.webm" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="init.js" />
    <script src="init.js"></script>
</head>
<body>
    <div class="loading" id="loading">Loading Willow...</div>
    <div id="toast-root" aria-live="polite" aria-relevant="additions"></div>
</body>
</html>
