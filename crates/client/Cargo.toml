[package]
name = "willow-client"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "UI-agnostic client library for the Willow P2P chat network"

[dependencies]
willow-identity = { path = "../identity" }
willow-messaging = { path = "../messaging" }
willow-channel = { path = "../channel" }
willow-network = { path = "../network" }
willow-transport = { path = "../transport" }
willow-crypto = { path = "../crypto" }
willow-files = { path = "../files" }

anyhow = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }
dirs = "6"
rusqlite = { version = "0.31", features = ["bundled"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = "0.4"
futures = "0.3"
web-sys = { version = "0.3", features = ["Window", "Storage"] }
js-sys = "0.3"
gloo-timers = { version = "0.3", features = ["futures"] }

[dev-dependencies]
tempfile = "3"
