services:
  relay:
    build:
      context: .
      dockerfile: docker/relay.Dockerfile
    ports:
      - "9090:9090"
      - "9091:9091"
    volumes:
      - relay-identity:/etc/willow
      - shared:/shared
    restart: unless-stopped

  replay-1:
    build:
      context: .
      dockerfile: docker/replay.Dockerfile
    volumes:
      - replay-1-identity:/etc/willow
      - shared:/shared:ro
    environment:
      - MAX_EVENTS_PER_SERVER=1000
      - SYNC_INTERVAL=30
    depends_on:
      - relay
    restart: unless-stopped

  replay-2:
    build:
      context: .
      dockerfile: docker/replay.Dockerfile
    volumes:
      - replay-2-identity:/etc/willow
      - shared:/shared:ro
    environment:
      - MAX_EVENTS_PER_SERVER=1000
      - SYNC_INTERVAL=30
    depends_on:
      - relay
    restart: unless-stopped

  storage-1:
    build:
      context: .
      dockerfile: docker/storage.Dockerfile
    volumes:
      - storage-1-identity:/etc/willow
      - storage-1-data:/var/lib/willow
      - shared:/shared:ro
    environment:
      - SYNC_INTERVAL=60
    depends_on:
      - relay
    restart: unless-stopped

  storage-2:
    build:
      context: .
      dockerfile: docker/storage.Dockerfile
    volumes:
      - storage-2-identity:/etc/willow
      - storage-2-data:/var/lib/willow
      - shared:/shared:ro
    environment:
      - SYNC_INTERVAL=60
    depends_on:
      - relay
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "${WILLOW_WEB_PORT:-8080}:8080"
    depends_on:
      - relay
    restart: unless-stopped

volumes:
  relay-identity:
  shared:
  replay-1-identity:
  replay-2-identity:
  storage-1-identity:
  storage-1-data:
  storage-2-identity:
  storage-2-data:
