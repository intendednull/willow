name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: e2e-

      - name: Install just
        uses: taiki-e/install-action@b5fddbb5361bce8a06fb168c9d403a6cc552b084 # v2.9.4 just
        with:
          tool: just

      - name: Run full E2E flow (setup + tests + teardown)
        id: e2e
        run: just test-e2e-full 2>&1 | tee /tmp/e2e.log
      - name: Surface E2E failure
        if: failure() && steps.e2e.conclusion == 'failure'
        run: |
          {
            echo "## Playwright E2E failed"
            echo
            echo '<details><summary>just / playwright output (last 300 lines)</summary>'
            echo
            echo '```'
            tail -n 300 /tmp/e2e.log || echo "(no log captured)"
            echo '```'
            echo
            echo '</details>'
            for f in .dev/logs/relay.log .dev/logs/replay.log .dev/logs/storage.log .dev/logs/web.log; do
              [ -f "$f" ] || continue
              echo
              echo "<details><summary>$f (last 100 lines)</summary>"
              echo
              echo '```'
              tail -n 100 "$f"
              echo '```'
              echo
              echo '</details>'
            done
          } >> "$GITHUB_STEP_SUMMARY"
