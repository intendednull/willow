name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: clippy-
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-
      # `cargo test --workspace` runs all tests not marked `#[ignore]`.
      # The iroh-based real-UDP integration tests in
      # `crates/network/tests/integration.rs` are marked `#[ignore]`
      # because they're flaky on GHA dual-stack networking (see #360),
      # and are exercised by the `network-integration` job below.
      - run: cargo test --workspace

  network-integration:
    name: Network Integration (allowed to fail)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The iroh integration tests use real UDP endpoints and gossip
    # NeighborUp/Down signaling. They're flaky on GHA dual-stack
    # networking, so they run for signal but do not gate merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-
      - run: cargo test -p willow-network --test integration -- --ignored --test-threads=1

  wasm:
    name: WASM Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-
      - run: cargo check --target wasm32-unknown-unknown --workspace --exclude willow-relay --exclude willow-worker --exclude willow-replay --exclude willow-storage --exclude willow-agent

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # Known advisories are tracked in dedicated issues; fail only on new ones.
      # When each issue is resolved, remove the matching --ignore entry.
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0098 `# rustls-webpki name-constraint (#223)` \
            --ignore RUSTSEC-2026-0099 `# rustls-webpki URI-constraint  (#223)` \
            --ignore RUSTSEC-2026-0104 `# rustls-webpki CRL panic       (#223)` \
            --ignore RUSTSEC-2026-0097 `# rand unsoundness              (#246)` \
            --ignore RUSTSEC-2025-0141 `# bincode 1.x unmaintained      (#247)`
