<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willow</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1e;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <script type="module">
        // Capture paste events before Bevy prevents default on key events.
        document.addEventListener('paste', (e) => {
            const text = (e.clipboardData || window.clipboardData)?.getData('text');
            if (text) {
                window.__willow_paste = text;
            }
        }, true);

        import init from './pkg/willow-app.js';
        await init();

        // Ensure the canvas gets keyboard focus on any click.
        const canvas = document.querySelector('canvas');
        if (canvas) {
            canvas.tabIndex = 0;
            canvas.focus();
            document.addEventListener('click', () => canvas.focus());
        }
    </script>
</body>
</html>
