<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willow</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1e;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <script type="module">
        // Intercept Ctrl+V/Cmd+V before Bevy's handler can preventDefault().
        // This lets the browser fire the native paste event, which we capture
        // below without triggering a clipboard permission popup.
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                e.stopPropagation();
            }
        }, true);

        // Capture paste data from the native paste event (no permission needed).
        document.addEventListener('paste', (e) => {
            const text = (e.clipboardData || window.clipboardData)?.getData('text');
            if (text) {
                window.__willow_paste = text;
            }
        }, true);

        import init from './pkg/willow-app.js';
        await init();

        const canvas = document.querySelector('canvas');
        if (canvas) {
            canvas.tabIndex = 0;
            canvas.focus();
            document.addEventListener('click', () => canvas.focus());
        }
    </script>
</body>
</html>
